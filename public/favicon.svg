<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><style>@keyframes pulse { 0%, 100% { opacity: 1; r: 8; } 50% { opacity: 0.6; r: 9; } } .star { animation: pulse 3s infinite ease-in-out; }</style><path d="M80 20 L35 20 L25 45 L75 55 L65 80 L20 80" stroke="#f59e0b" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none"/><circle cx="80" cy="20" r="8" fill="#fbbf24" class="star" style="animation-delay:0s"/><circle cx="35" cy="20" r="6" fill="#fbbf24" class="star" style="animation-delay:0.5s"/><circle cx="25" cy="45" r="8" fill="#fbbf24" class="star" style="animation-delay:1s"/><circle cx="75" cy="55" r="6" fill="#fbbf24" class="star" style="animation-delay:1.5s"/><circle cx="65" cy="80" r="8" fill="#fbbf24" class="star" style="animation-delay:2s"/><circle cx="20" cy="80" r="6" fill="#fbbf24" class="star" style="animation-delay:2.5s"/></svg>
